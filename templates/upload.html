{% extends 'layout.html' %}

{% block content %}
<div class="fade-up" style="max-width: 540px; margin: var(--space-2xl) auto;">

    <div style="text-align: center; margin-bottom: var(--space-2xl);">
        <h1><span class="gradient-text">Indexar</span></h1>
        <p class="page-subtitle" style="font-size: 1rem; margin-top: 8px;">
            Sacá una foto y la IA identifica todo.
        </p>
    </div>

    <div class="card" style="padding: var(--space-xl);">
        <form action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data" id="upload-form">
            <div style="margin-bottom: var(--space-xl);">
                <label>Nombre de la Ubicación</label>
                <input type="text" name="nombre_ubicacion" placeholder="Ej: Cajón del Escritorio, Estante Cocina..."
                    required style="border-radius: 980px;">
            </div>

            <div style="margin-bottom: var(--space-xl);">
                <label>Foto o Video</label>

                <!-- Botones Duales Premium -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
                    <button type="button" class="btn btn-secondary"
                        style="display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px 10px; border-radius: 16px; background: rgba(255,255,255,0.03);"
                        onclick="document.getElementById('camera-input').click();">
                        <span style="font-size: 1.5rem;">📸</span>
                        <span
                            style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Capturar</span>
                    </button>
                    <button type="button" class="btn btn-secondary"
                        style="display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px 10px; border-radius: 16px; background: rgba(255,255,255,0.03);"
                        onclick="document.getElementById('gallery-input').click();">
                        <span style="font-size: 1.5rem;">🖼️</span>
                        <span
                            style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Galería</span>
                    </button>
                </div>

                <!-- Inputs Ocultos -->
                <input type="file" id="camera-input" name="file" accept="image/*" capture="environment"
                    style="display: none;" onchange="handleFileSelection(this)">
                <input type="file" id="gallery-input" name="file" accept="image/*,video/*" style="display: none;"
                    onchange="handleFileSelection(this)">

                <div id="drop-zone"
                    style="border: 2px dashed rgba(255,255,255,0.08); border-radius: var(--radius-xl); padding: var(--space-xl); text-align: center; transition: all 0.4s var(--transition-smooth); position: relative;">

                    <div id="upload-placeholder">
                        <p id="upload-status-text"
                            style="font-weight: 600; font-size: 0.85rem; color: var(--text-dim);">Arrastra o espera la
                            carga...</p>
                    </div>
                </div>
                <div id="file-preview" style="display: none; margin-top: var(--space-sm);">
                    <div
                        style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius-lg); overflow: hidden;">
                        <img id="preview-image" src=""
                            style="width: 100%; max-height: 200px; object-fit: cover; display: none;">
                        <video id="preview-video" src="" style="width: 100%; max-height: 200px; display: none;" controls
                            muted></video>
                        <div
                            style="padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <p id="preview-name" style="font-weight: 600; font-size: 0.82rem;"></p>
                                <p id="preview-size"
                                    style="color: var(--text-dim); font-size: 0.72rem; margin-top: 2px;"></p>
                            </div>
                            <button type="button" onclick="clearPreview()" class="btn btn-sm"
                                style="background: var(--danger-dim); color: #fca5a5; border: 1px solid rgba(239,68,68,0.15);">✕</button>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; border-radius: 980px;">
                Subir e Indexar con IA →
            </button>
        </form>
    </div>
</div>

<!-- Loading Overlay -->
<div id="loading-overlay"
    style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(20px);">
    <div
        style="position: relative; width: 140px; height: 140px; border: 1px solid rgba(99,102,241,0.3); border-radius: var(--radius-xl); overflow: hidden;">
        <div class="scanner-line"></div>
    </div>
    <h3
        style="margin-top: var(--space-xl); letter-spacing: 3px; text-transform: uppercase; font-size: 0.78rem; color: var(--text-dim);">
        Analizando...</h3>
    <p style="color: var(--text-muted); margin-top: 6px; font-size: 0.78rem;">Gemini Vision identificando objetos</p>
</div>

<style>
    .scanner-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: var(--primary);
        box-shadow: 0 0 20px var(--primary);
        animation: scan 2s ease-in-out infinite;
    }

    @keyframes scan {

        0%,
        100% {
            top: 0;
        }

        50% {
            top: 100%;
        }
    }
</style>

<script>
    async function handleFileSelection(input) {
        const file = input.files[0];
        if (!file) return;

        // Desactivar el otro input
        const otherId = input.id === 'camera-input' ? 'gallery-input' : 'camera-input';
        document.getElementById(otherId).disabled = true;

        const dz = document.getElementById('drop-zone');
        const statusText = document.getElementById('upload-status-text');

        dz.style.borderStyle = 'solid';
        dz.style.borderColor = 'var(--primary)';
        dz.style.background = 'rgba(99,102,241,0.05)';
        statusText.innerHTML = `<span style="color: var(--primary);">✓ ${file.name} seleccionado</span>`;

        document.getElementById('file-preview').style.display = 'block';
        document.getElementById('preview-name').textContent = file.name;
        document.getElementById('preview-size').textContent = (file.size / 1048576).toFixed(1) + ' MB';

        if (file.type.startsWith('image/')) {
            const r = new FileReader();
            r.onload = e => {
                const img = document.getElementById('preview-image');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            r.readAsDataURL(file);
            document.getElementById('preview-video').style.display = 'none';
        } else if (file.type.startsWith('video/')) {
            const v = document.getElementById('preview-video');
            v.src = URL.createObjectURL(file);
            v.style.display = 'block';
            document.getElementById('preview-image').style.display = 'none';
        }
    }

    function clearPreview() {
        const cam = document.getElementById('camera-input');
        const gal = document.getElementById('gallery-input');
        cam.value = ''; cam.disabled = false;
        gal.value = ''; gal.disabled = false;
        window._resizedBlob = null; // Clear resized buffer

        const dz = document.getElementById('drop-zone');
        const statusText = document.getElementById('upload-status-text');
        dz.style.borderStyle = 'dashed';
        dz.style.borderColor = 'rgba(255,255,255,0.08)';
        dz.style.background = '';
        statusText.textContent = 'Arrastra o espera la carga...';
        document.getElementById('file-preview').style.display = 'none';
    }

    // --- OPTIMIZACIÓN MÓVIL (Client-side Resize) ---
    async function resizeImage(file, maxWidth = 1600, quality = 0.8) {
        // 1. Saltos preventivos: HEIC/HEIF o Videos
        if (file.type === 'image/heic' || file.type === 'image/heif' || file.name.toLowerCase().endsWith('.heic')) {
            console.log("[VANGUARD] Saltando resize en móvil para HEIC (procesamiento en servidor)");
            return file;
        }
        if (!file.type.startsWith('image/')) return file;

        // 2. Timeout de seguridad (5 segundos) para no dejar la pantalla en blanco
        return new Promise((resolve) => {
            const timeout = setTimeout(() => {
                console.warn("[VANGUARD] Resizing excedió el tiempo límite. Usando original.");
                resolve(file);
            }, 5000);

            const reader = new FileReader();
            reader.onerror = () => {
                clearTimeout(timeout);
                resolve(file);
            };
            reader.readAsDataURL(file);

            reader.onload = (event) => {
                const img = new Image();
                img.onerror = () => {
                    clearTimeout(timeout);
                    resolve(file);
                };
                img.src = event.target.result;

                img.onload = () => {
                    // Si la imagen es pequeña, no hace falta procesar
                    if (img.width <= maxWidth) {
                        clearTimeout(timeout);
                        resolve(file);
                        return;
                    }

                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth) {
                        height *= maxWidth / width;
                        width = maxWidth;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    canvas.toBlob((blob) => {
                        clearTimeout(timeout);
                        if (!blob) {
                            resolve(file);
                            return;
                        }
                        resolve(new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".jpg", { type: 'image/jpeg' }));
                    }, 'image/jpeg', quality);
                };
            };
        });
    }

    document.getElementById('upload-form').onsubmit = async function (e) {
        const cam = document.getElementById('camera-input');
        const gal = document.getElementById('gallery-input');
        const file = cam.files[0] || gal.files[0];

        if (file && file.type.startsWith('image/')) {
            e.preventDefault(); // Pause submission
            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('upload-status-text').textContent = 'Comprimiendo imagen...';

            const optimizedFile = await resizeImage(file);

            // Create a new DataTransfer to replace the file in the input
            const container = new DataTransfer();
            container.items.add(optimizedFile);
            if (cam.files.length) cam.files = container.files;
            else gal.files = container.files;

            this.submit(); // Resume submission
        } else {
            document.getElementById('loading-overlay').style.display = 'flex';
        }
    };

    // Drag & Drop
    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--primary)'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'rgba(255,255,255,0.08)'; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        const files = e.dataTransfer.files;
        if (files.length) {
            const input = document.getElementById('gallery-input');
            input.files = files;
            handleFileSelection(input);
        }
    });
</script>
</script>
{% endblock %}
