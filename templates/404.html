{% extends 'layout.html' %}

{% block content %}
<div
    style="height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: var(--space-lg);">
    <div style="font-size: 5rem; animation: float 3s ease-in-out infinite;">🔍</div>
    <h1
        style="font-size: 2.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        Espacio No Encontrado</h1>
    <p style="color: var(--text-dim); max-width: 400px; margin: 0 auto;">Parece que este rincón de tu casa aún no ha
        sido indexado o la dirección no es correcta.</p>
    <div style="display: flex; gap: var(--space-md); margin-top: var(--space-lg);">
        <a href="{{ url_for('index') }}" class="btn btn-primary">Volver al Inicio</a>
        <a href="{{ url_for('gallery') }}" class="btn btn-secondary">Ver mis cosas</a>
    </div>
</div>

<style>
    @keyframes float {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-20px);
        }
    }
</style>
{% endblock %}
