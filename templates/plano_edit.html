{% extends 'layout.html' %}

{% block content %}
<div class="card" style="max-width: 900px; margin: 0 auto; padding: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2>✏️ Editar Plano: {{ plano.nombre }}</h2>
        <a href="{{ url_for('ver_plano', plano_id=plano.id) }}" class="btn btn-secondary">← Volver al Mapa</a>
    </div>

    <form id="edit-form" method="POST" enctype="multipart/form-data">
        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-dim);">Nombre del Plano</label>
            <input type="text" name="nombre" value="{{ plano.nombre }}" required
                style="width: 100%; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 0.8rem; color: white;">
        </div>

        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-dim);">Edita tu plano</label>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem;">
                <button type="button" id="tool-pencil" class="btn btn-secondary" style="padding: 5px 10px;"
                    title="Lápiz libre">✏️</button>
                <button type="button" id="tool-line" class="btn btn-secondary" style="padding: 5px 10px;"
                    title="Línea recta">📏</button>
                <button type="button" id="tool-rectangle" class="btn btn-secondary" style="padding: 5px 10px;"
                    title="Rectángulo">▭</button>
                <button type="button" id="tool-circle" class="btn btn-secondary" style="padding: 5px 10px;"
                    title="Círculo">⭕</button>
                <button type="button" id="tool-eraser" class="btn btn-secondary" style="padding: 5px 10px;"
                    title="Borrador">🧼</button>
                <button type="button" id="tool-clear" class="btn btn-secondary" style="padding: 5px 10px;"
                    title="Limpiar todo">🗑️</button>
            </div>
            <div
                style="background: white; border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <canvas id="draw-canvas" width="800" height="600"
                    style="width: 100%; cursor: crosshair; touch-action: none; display: block;"></canvas>
            </div>
            <p style="font-size: 0.8rem; color: var(--text-dim); margin-top: 0.5rem;">
                El plano actual se cargó en el canvas. Puedes modificarlo con las herramientas geométricas.
            </p>
        </div>

        <input type="hidden" name="drawing_data" id="drawing_data">
        <button type="submit" class="btn" style="width: 100%; height: 50px; font-size: 1.1rem;">💾 Guardar
            Cambios</button>
    </form>
</div>

<script>
    const canvas = document.getElementById('draw-canvas');
    const ctx = canvas.getContext('2d');
    const form = document.getElementById('edit-form');
    const drawingDataInput = document.getElementById('drawing_data');

    let drawing = false;
    let tool = 'pencil';
    let startX, startY;
    let snapshot;

    // Cargar imagen existente del plano
    const img = new Image();
    img.onload = function () {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    };
    img.src = "{{ url_for('uploaded_file', filename=plano.imagen_path) }}";

    // Herramientas
    document.getElementById('tool-pencil').onclick = () => tool = 'pencil';
    document.getElementById('tool-line').onclick = () => tool = 'line';
    document.getElementById('tool-rectangle').onclick = () => tool = 'rectangle';
    document.getElementById('tool-circle').onclick = () => tool = 'circle';
    document.getElementById('tool-eraser').onclick = () => tool = 'eraser';
    document.getElementById('tool-clear').onclick = () => {
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    };

    ctx.lineWidth = 3;
    ctx.lineCap = 'round';

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    function start(e) {
        drawing = true;
        const pos = getPos(e);
        startX = pos.x;
        startY = pos.y;

        if (tool !== 'pencil' && tool !== 'eraser') {
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    function move(e) {
        if (!drawing) return;
        const pos = getPos(e);

        ctx.strokeStyle = tool === 'eraser' ? 'white' : 'black';
        ctx.lineWidth = tool === 'eraser' ? 20 : 3;

        if (tool === 'pencil') {
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        } else if (tool === 'eraser') {
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        } else {
            ctx.putImageData(snapshot, 0, 0);
            ctx.beginPath();

            if (tool === 'line') {
                ctx.moveTo(startX, startY);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            } else if (tool === 'rectangle') {
                const width = pos.x - startX;
                const height = pos.y - startY;
                ctx.strokeRect(startX, startY, width, height);
            } else if (tool === 'circle') {
                const radius = Math.sqrt(Math.pow(pos.x - startX, 2) + Math.pow(pos.y - startY, 2));
                ctx.arc(startX, startY, radius, 0, 2 * Math.PI);
                ctx.stroke();
            }
        }
    }

    function end() {
        drawing = false;
        snapshot = null;
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);

    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', move);
    canvas.addEventListener('touchend', end);

    form.onsubmit = (e) => {
        drawingDataInput.value = canvas.toDataURL('image/png');
    };
</script>
{% endblock %}
