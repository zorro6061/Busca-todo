{% extends 'layout.html' %}

{% block content %}
<div class="fade-up"
    style="position: relative; width: 100%; height: 75vh; border-radius: var(--radius-2xl); overflow: hidden; background: #000; box-shadow: var(--shadow-lg); border: 1px solid var(--glass-border);">
    <!-- Beta Badge (Apple style) -->
    <div style="position: absolute; top: 20px; left: 20px; z-index: 10; display: flex; gap: 8px; align-items: center;">
        <span class="badge"
            style="background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; padding: 6px 14px; font-weight: 700;">🧪
            EXPERIMENTAL</span>
    </div>

    <!-- Video Feed -->
    <video id="ar-video" autoplay playsinline
        style="width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9);"></video>

    <!-- AR Overlays Layer -->
    <div id="ar-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
        <!-- Scanner Line with premium glow -->
        <div id="scanner-line"
            style="position: absolute; width: 100%; height: 2px; background: var(--primary); box-shadow: 0 0 25px var(--primary); top: 50%; opacity: 0.6; z-index: 5;">
        </div>
    </div>

    <!-- Control UI (Tesla style) -->
    <div
        style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; width: 90%; max-width: 480px; z-index: 20;">
        <div class="card"
            style="padding: var(--space-md) var(--space-xl); background: rgba(0,0,0,0.7); backdrop-filter: blur(20px) saturate(1.8); -webkit-backdrop-filter: blur(20px) saturate(1.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 980px; box-shadow: var(--shadow-lg);">
            <h3 style="margin: 0; font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase;">AR Mode Core
            </h3>
            <p style="margin: 4px 0 0 0; font-size: 0.75rem; color: var(--text-dim); line-height: 1.4;">
                Simulando detección espacial · La cámara está activa pero el procesamiento visual es una demo técnica.
            </p>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('ar-video');
    const overlay = document.getElementById('ar-overlay');

    // Init Camera (facingMode environment for mobile back camera)
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => {
                console.error("Camera Error:", err);
                mostrarToast("No se pudo acceder a la cámara", "error");
            });
    }

    // Mock AR Detection Logic
    const mockTags = ["Taladro Percutor", "Cámara IP v3", "Router Fibra", "Sensor Humedad", "Kit Herramientas"];

    function spawnTag() {
        if (Math.random() > 0.65) {
            const x = Math.random() * 70 + 15;
            const y = Math.random() * 70 + 15;
            const text = mockTags[Math.floor(Math.random() * mockTags.length)];

            const tagEl = document.createElement('div');
            tagEl.innerHTML = `
                <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                    <div style="width: 14px; height: 14px; background: var(--primary); border: 2.5px solid white; border-radius: 50%; box-shadow: 0 0 10px var(--primary);"></div>
                    <div class="card" style="padding: 6px 14px; background: white; color: black; border-radius: 980px; font-weight: 800; font-size: 0.8rem; box-shadow: 0 8px 30px rgba(0,0,0,0.5); transform: translateY(0); transition: all 0.4s var(--transition-smooth); border: none;">
                        ${text}
                    </div>
                </div>
            `;
            tagEl.style.position = "absolute";
            tagEl.style.left = x + "%";
            tagEl.style.top = y + "%";
            tagEl.style.opacity = "0";
            tagEl.style.transform = "scale(0.8) translateY(20px)";
            tagEl.style.transition = "all 0.6s var(--transition-smooth)";

            overlay.appendChild(tagEl);

            // Animate In
            setTimeout(() => {
                tagEl.style.opacity = "1";
                tagEl.style.transform = "scale(1) translateY(0)";
            }, 50);

            // Animate Out
            setTimeout(() => {
                tagEl.style.opacity = "0";
                tagEl.style.transform = "scale(0.8) translateY(-20px)";
                setTimeout(() => tagEl.remove(), 600);
            }, 2500);
        }
    }

    setInterval(spawnTag, 1200);

    // Scanner Line Animation
    const line = document.getElementById('scanner-line');
    let pos = 50;
    let dir = 0.4;
    function animateScan() {
        pos += dir;
        if (pos > 92 || pos < 8) dir *= -1;
        line.style.top = pos + "%";
        requestAnimationFrame(animateScan);
    }
    animateScan();
</script>
{% endblock %}
