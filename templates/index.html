{% extends 'layout.html' %}

{% block content %}
<!-- ══ SMART SEARCH HERO (Minimalist) ══ -->
<section style="text-align: center; padding: 15vh 0 10vh; position: relative;">
    <div class="fade-up">
        <h1 style="font-size: 3rem; margin-bottom: 24px;">¿Dónde está?</h1>
        <p
            style="color: var(--text-dim); font-size: 1.1rem; margin-bottom: 40px; max-width: 500px; margin-inline: auto;">
            Tu hogar en la punta de tus dedos. Busca cualquier objeto y te diremos exactamente dónde está.
        </p>
    </div>

    <!-- Barra de Búsqueda Inteligente -->
    <div class="fade-up fade-up-1" style="max-width: 680px; margin: 0 auto; position: relative;">
        <div class="glass-search-container">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="smart-search-input" placeholder="¿Dónde dejé mis llaves?" autocomplete="off">
            <div id="search-spinner" class="spinner" style="display: none;"></div>
        </div>

        <!-- Resultados Rápidos (Card Glass) -->
        <div id="result-overlay" class="result-card" style="display: none;">
            <div class="result-header">
                <div class="status-indicator"></div>
                <span id="result-text">Objetivo localizado</span>
                <button onclick="closeResult()" class="close-btn">&times;</button>
            </div>

            <div class="result-main">
                <div class="result-photo-container">
                    <img id="result-img" src="" alt="Hallazgo">
                    <div id="bbox-overlay" class="bbox-highlight" style="display: none;"></div>
                </div>

                <div class="result-info">
                    <h3 id="obj-name">...</h3>
                    <p id="obj-desc" style="color: var(--text-dim); margin: 8px 0;"></p>
                    <div class="location-badge">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <span id="obj-location">...</span>
                    </div>
                </div>
            </div>

            <div id="map-preview" class="map-preview">
                <!-- Se inyectará el SVG del plano -->
            </div>
        </div>
    </div>
</section>

<!-- Bento Grid (Solo estadisticas clave) -->
<section style="padding: 20px 0 100px;">
    <div class="bento-grid-minimal" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
        <div class="card glass-card reveal">
            <span class="stat-label">Objetos Indexados</span>
            <p class="stat-value" data-count="{{ obj_count }}">{{ obj_count }}</p>
        </div>
        <div class="card glass-card reveal">
            <span class="stat-label">Zonas Mapeadas</span>
            <p class="stat-value" data-count="{{ plano_count }}">{{ plano_count }}</p>
        </div>
    </div>
</section>

<style>
    .glass-search-container {
        background: rgba(40, 40, 40, 0.4);
        backdrop-filter: blur(40px) saturate(1.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 4px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        transition: all 0.4s var(--transition-smooth);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    .glass-search-container:focus-within {
        background: rgba(60, 60, 60, 0.5);
        border-color: var(--primary);
        box-shadow: 0 0 40px var(--primary-glow);
        transform: scale(1.02);
    }

    .search-icon {
        width: 22px;
        height: 22px;
        color: var(--text-dim);
    }

    #smart-search-input {
        background: transparent;
        border: none;
        box-shadow: none;
        padding: 24px 0;
        font-size: 1.4rem;
        font-weight: 500;
        letter-spacing: -0.02em;
    }

    .result-card {
        position: absolute;
        top: 110%;
        left: 0;
        right: 0;
        background: rgba(15, 15, 15, 0.95);
        backdrop-filter: blur(50px);
        border: 1px solid var(--glass-border);
        border-radius: 32px;
        padding: 24px;
        text-align: left;
        z-index: 1000;
        animation: scaleIn 0.5s var(--transition-smooth);
    }

    .result-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
    }

    .status-indicator {
        width: 8px;
        height: 8px;
        background: var(--success);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--success);
        animation: pulse 2s infinite;
    }

    .result-main {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 20px;
        margin-bottom: 24px;
    }

    .result-photo-container {
        height: 140px;
        border-radius: 18px;
        overflow: hidden;
        position: relative;
    }

    #result-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .location-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        margin-top: 16px;
        font-size: 0.9rem;
    }

    .location-badge svg {
        width: 16px;
        height: 16px;
        color: var(--primary);
    }

    .map-preview {
        height: 180px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 20px;
        overflow: hidden;
    }

    .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .close-btn {
        margin-left: auto;
        background: none;
        border: none;
        color: var(--text-dim);
        font-size: 1.5rem;
        cursor: pointer;
    }
</style>

<script>
    const searchInput = document.getElementById('smart-search-input');
    const spinner = document.getElementById('search-spinner');
    const resultOverlay = document.getElementById('result-overlay');

    searchInput.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') {
            const query = searchInput.value.trim();
            if (!query) return;

            spinner.style.display = 'block';

            try {
                const response = await fetch(`/api/smart-search?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.success) {
                    showResult(data.match);
                } else {
                    window.showIsland("No encontramos '" + query + "'", 3000, 'error');
                }
            } catch (err) {
                console.error(err);
                window.showIsland("Error en la conexión", 3000, 'error');
            } finally {
                spinner.style.display = 'none';
            }
        }
    });

    function showResult(match) {
        document.getElementById('obj-name').textContent = match.nombre;
        document.getElementById('obj-desc').textContent = match.descripcion || 'Sin descripción';
        document.getElementById('obj-location').textContent = match.ubicacion_nombre;
        document.getElementById('result-img').src = '/uploads/' + match.imagen_path;

        // BBox Logic
        if (match.bbox) {
            const overlay = document.getElementById('bbox-overlay');
            overlay.style.setProperty('--top', match.bbox[0] / 1000);
            overlay.style.setProperty('--left', match.bbox[1] / 1000);
            overlay.style.setProperty('--height', (match.bbox[2] - match.bbox[0]) / 1000);
            overlay.style.setProperty('--width', (match.bbox[3] - match.bbox[1]) / 1000);
            overlay.style.display = 'block';
        }

        // Map Logic (Highlight zone)
        if (match.zona_coords) {
            const mapContainer = document.getElementById('map-preview');
            // Aquí inyectaríamos un mini SVG del plano con la zona pintada
            mapContainer.innerHTML = `<div style="padding: 20px; color: var(--text-dim); text-align: center;">Viendo Mapa: ${match.plano_nombre}</div>`;
        }

        resultOverlay.style.display = 'block';
    }

    function closeResult() {
        resultOverlay.style.display = 'none';
    }
</script>

<!-- Autocomplete JS -->
<script>
    (function () {
        const si = document.getElementById('search-input');
        const dd = document.getElementById('suggestions-dropdown');
        let timer;
        function debounce(fn, d) { return (...a) => { clearTimeout(timer); timer = setTimeout(() => fn(...a), d); }; }

        async function fetch_sug(q) {
            if (q.length < 2) { dd.style.display = 'none'; return; }
            try {
                const r = await fetch(`/api/sugerencias?q=${encodeURIComponent(q)}`);
                const s = await r.json();
                if (s.length === 0) { dd.style.display = 'none'; return; }
                dd.innerHTML = s.map(sug => `
                    <div style="padding: 14px 20px; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; justify-content: space-between; align-items: center;"
                         onmouseenter="this.style.background='rgba(99,102,241,0.08)'"
                         onmouseleave="this.style.background=''"
                         onclick="si.value='${sug.texto}'; dd.style.display='none'; document.getElementById('search-form').submit();">
                        <span style="font-size: 0.9rem; text-transform: capitalize;">${highlight(sug.texto, q)}</span>
                        <span class="badge badge-primary">${sug.score}%</span>
                    </div>`).join('');
                dd.style.display = 'block';
            } catch (e) { console.error(e); }
        }

        function highlight(t, q) { return t.replace(new RegExp(`(${q})`, 'gi'), '<span style="color: var(--primary); font-weight: 700;">$1</span>'); }

        si.addEventListener('input', debounce(e => fetch_sug(e.target.value.trim()), 300));
        document.addEventListener('click', e => { if (!si.contains(e.target) && !dd.contains(e.target)) dd.style.display = 'none'; });
        si.addEventListener('keydown', e => { if (e.key === 'Escape') dd.style.display = 'none'; });
    })();

    // ── Animated Counters (Tesla-style) ──
    document.querySelectorAll('[data-count]').forEach(el => {
        const target = parseInt(el.dataset.count);
        if (isNaN(target) || target === 0) return;
        const duration = 1200;
        const start = performance.now();
        el.textContent = '0';

        const io = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting) {
                function tick(now) {
                    const p = Math.min((now - start) / duration, 1);
                    const ease = 1 - Math.pow(1 - p, 3);
                    el.textContent = Math.round(target * ease);
                    if (p < 1) requestAnimationFrame(tick);
                }
                requestAnimationFrame(tick);
                io.disconnect();
            }
        }, { threshold: 0.5 });
        io.observe(el.closest('.bento-item') || el.parentElement);
    });
</script>

<style>
    @media (max-width: 768px) {
        .grid[style*="repeat(4"] {
            grid-template-columns: repeat(2, 1fr) !important;
        }
    }
</style>
{% endblock %}
